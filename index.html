<!DOCTYPE html>
<html lang="es" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JONATHAN RANGEL | FOAMI PREMIUM INVERSIONES GUICAR 2025</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/theme.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        "2xl": "1rem",
                        full: "9999px"
                    },
                    spacing: {
                        "margin-mobile": "20px",
                        "margin-desktop": "64px",
                        "gutter": "24px",
                        "unit": "8px",
                        "container-max": "1440px"
                    },
                    fontFamily: {
                        "body-md": ["Inter"],
                        "button": ["Inter"],
                        "h2": ["Inter"],
                        "h3": ["Inter"],
                    },
                    fontSize: {
                        "button": ["14px", {"lineHeight": "1", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "h3": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "h2": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-surface font-body-md overflow-x-auto antialiased">
    <!-- Ambient Glow Orbs -->
    <div class="bg-glow-orb w-96 h-96 bg-orange-500/30 -top-40 -left-40"></div>
    <div class="bg-glow-orb w-[500px] h-[500px] bg-purple-500/20 bottom-0 right-0"></div>
    <div class="bg-glow-orb w-80 h-80 bg-blue-400/20 top-1/3 left-1/2"></div>

    <!-- Header -->
    <header class="fixed top-0 w-full z-50 bg-zinc-950/70 backdrop-blur-xl border-b border-white/10 shadow-2xl shadow-black/30">
        <div class="flex justify-between items-center w-full px-6 md:px-8 h-16 max-w-7xl mx-auto">
            <div class="flex items-center gap-4">
                <img src="https://raw.githubusercontent.com/JJRB47/JJRB47/main/assets/logo-jrb.png" alt="Logo Jonathan Rangel" class="w-9 h-9 rounded-lg object-contain bg-white/5 p-1 border border-white/10" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-orange-500 to-pink-500 flex items-center justify-center text-xs font-bold" style="display:none;">JR</div>
                <div class="flex flex-col">
                    <div class="text-2xl font-bold tracking-[2px] text-white/90 uppercase leading-none mb-1">JONATHAN JOSE RANGEL BETANCOURY</div>
                    <span class="text-base md:text-xl text-neon-green font-bold tracking-wider uppercase">Inversiones Guicar</span>
                </div>
            </div>
            <div class="flex items-center gap-5">
                <button onclick="goToMainSite()" class="p-2 rounded-full glass hover:bg-white/10 transition-all active:scale-95" aria-label="Ir a página principal">
                    <i data-lucide="home" class="w-5 h-5 text-white"></i>
                </button>
                <button onclick="openCart()" class="relative p-2 rounded-full glass hover:bg-white/10 transition-all active:scale-95">
                    <i data-lucide="shopping-bag" class="w-5 h-5 text-white"></i>
                    <span id="cartBadge" class="hidden absolute -top-1 -right-1 w-5 h-5 bg-orange-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center shadow-lg">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="relative z-10 pt-20 pb-28 lg:pb-32">
        <div id="categoriesView" class="max-w-7xl mx-auto px-5 md:px-8 py-8 md:py-14">
            <div id="categoryGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
        <div id="colorsView" class="hidden max-w-7xl mx-auto px-5 md:px-8 py-8 md:py-14">
            <div id="colorsContent"></div>
        </div>
    </main>

    <!-- Cart Panel -->
    <div id="cartOverlay" class="fixed inset-0 z-[60] bg-black/70 overlay opacity-0 pointer-events-none transition-opacity duration-300" onclick="closeCart()"></div>
    <div id="cartPanel" class="fixed top-0 right-0 bottom-0 z-[70] w-full max-w-md cart-panel closed bg-[#0f0f0f]/95 backdrop-blur-2xl border-l border-white/10 shadow-2xl flex flex-col">
        <div class="flex items-center justify-between px-6 py-5 border-b border-white/10">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-xl bg-white/5 flex items-center justify-center"><i data-lucide="shopping-bag" class="w-5 h-5 text-orange-400"></i></div>
                <h2 class="text-xl font-semibold text-white">Tu pedido</h2>
            </div>
            <button onclick="closeCart()" class="p-2 rounded-full hover:bg-white/10 transition"><i data-lucide="x" class="w-5 h-5 text-zinc-400"></i></button>
        </div>
        <div id="cartItems" class="flex-1 overflow-y-auto px-5 py-4 space-y-3"></div>
        <div id="cartEmpty" class="flex-1 flex flex-col items-center justify-center text-center px-6">
            <i data-lucide="package-open" class="w-14 h-14 text-zinc-700 mb-3"></i>
            <p class="text-zinc-400 text-sm">Tu selección está vacía</p>
            <p class="text-zinc-500 text-xs mt-1">Explora las categorías y elige tus texturas.</p>
        </div>
        <div id="cartFooter" class="hidden border-t border-white/10 px-6 py-5 space-y-4"></div>
    </div>

    <!-- Floating Cart Button (mobile) -->
    <button id="floatingCartBtn" onclick="openCart()" class="fixed bottom-24 left-5 z-50 md:hidden w-12 h-12 rounded-full glass border border-white/20 shadow-xl flex items-center justify-center backdrop-blur-md bg-zinc-900/80">
        <i data-lucide="shopping-cart" class="w-5 h-5 text-white"></i>
        <span id="floatingBadge" class="hidden absolute -top-1 -right-1 w-5 h-5 bg-orange-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center">0</span>
    </button>

    <!-- Toast -->
    <div id="toastContainer" class="fixed bottom-6 right-5 z-[80] space-y-2 pointer-events-none"></div>

    <!-- Modal -->
    <div id="clearModal" class="fixed inset-0 z-[100] flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="closeClearModal()"></div>
        <div class="relative z-10 glass-card rounded-2xl p-6 max-w-sm w-full mx-4 transform scale-95 transition-all duration-300 border border-white/10 shadow-2xl" style="background: rgba(15,15,15,0.95);">
            <div class="flex flex-col items-center text-center">
                <div class="w-14 h-14 rounded-full bg-white/5 flex items-center justify-center mb-4 border border-white/10">
                    <i data-lucide="alert-triangle" class="w-7 h-7" style="color: var(--color-primary);"></i>
                </div>
                <h3 class="text-xl font-bold text-white mb-2">¿Vaciar todo el carrito?</h3>
                <p class="text-sm text-zinc-400 mb-6">Se eliminarán todos los productos seleccionados. Esta acción no se puede deshacer.</p>
                <div class="flex gap-3 w-full">
                    <button onclick="closeClearModal()" class="flex-1 py-2.5 rounded-xl border border-white/10 text-zinc-300 hover:bg-white/5 transition text-sm font-medium">Cancelar</button>
                    <button onclick="confirmClearCart()" class="flex-1 py-2.5 rounded-xl text-white font-bold transition-all active:scale-95" style="background: linear-gradient(135deg, var(--color-primary), var(--color-secondary)); box-shadow: 0 4px 15px var(--color-glow);">Sí, vaciar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script>
        function goToMainSite() {
            window.location.href = "https://jjrb47.github.io/JJRB47/";
        }
    </script>
</body>
</html>
